<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#f8a4c8">
  <link rel="manifest" href="manifest.json">
  <title>きょうのメッセージ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --pink-light: #fff0f5; --pink-soft: #ffd6e7; --pink-main: #f8a4c8;
      --pink-deep: #e87aad; --text: #5a3d4a; --text-light: #8a6a7a;
    }
    body {
      font-family: 'Zen Maru Gothic', sans-serif; background: var(--pink-light);
      color: var(--text); min-height: 100dvh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; overflow: hidden; position: relative;
    }
    .bg-hearts { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
    .bg-hearts .heart { position: absolute; opacity: 0.12; animation: floatHeart linear infinite; }
    @keyframes floatHeart {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.12; } 90% { opacity: 0.12; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }
    .card {
      position: relative; z-index: 1; width: 88vw; max-width: 380px; background: white;
      border-radius: 32px; padding: 36px 28px 32px;
      box-shadow: 0 4px 24px rgba(248,164,200,0.25), 0 1px 4px rgba(248,164,200,0.15);
      text-align: center;
    }
    .photo-frame {
      width: 120px; height: 120px; margin: 0 auto 20px; border-radius: 50%;
      border: 4px solid var(--pink-soft); overflow: hidden; background: var(--pink-light);
      display: flex; align-items: center; justify-content: center;
    }
    .photo-frame img { width: 100%; height: 100%; object-fit: cover; }
    .photo-frame.beating { animation: heartbeat 0.6s ease-in-out infinite; }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); border-color: var(--pink-soft); }
      30% { transform: scale(1.08); border-color: var(--pink-deep); }
      60% { transform: scale(1); }
      80% { transform: scale(1.05); border-color: var(--pink-main); }
    }
    .photo-frame .placeholder { font-size: 48px; line-height: 1; }
    .title { font-size: 14px; font-weight: 700; color: var(--pink-main); letter-spacing: 0.15em; margin-bottom: 6px; }
    .date { font-size: 12px; color: var(--text-light); margin-bottom: 24px; }
    .message-area {
      min-height: 160px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 16px; margin-bottom: 28px;
      position: relative;
    }
    .teasing {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .teasing.active { opacity: 1; }
    .teasing-text {
      font-size: 15px; font-weight: 700; color: var(--pink-deep);
      animation: teasePulse 0.8s ease-in-out infinite;
    }
    @keyframes teasePulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }
    .teasing-dots { display: flex; gap: 8px; }
    .teasing-dots span {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--pink-main); opacity: 0.3;
      animation: dotBounce 1.2s ease-in-out infinite;
    }
    .teasing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .teasing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
      30% { transform: translateY(-8px); opacity: 1; }
    }
    .heart-burst {
      position: absolute; inset: 0; pointer-events: none;
      display: flex; align-items: center; justify-content: center;
    }
    .message-text {
      font-size: 18px; font-weight: 700; line-height: 1.8; color: var(--text);
      opacity: 0; transform: translateY(20px) scale(0.9);
      transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .message-text.visible { opacity: 1; transform: translateY(0) scale(1); }
    .message-initial { font-size: 15px; color: var(--text-light); font-weight: 400; opacity: 1; transform: none; }
    .envelope-overlay {
      position: fixed; inset: 0; z-index: 20; display: flex; align-items: center;
      justify-content: center; background: rgba(255,240,245,0.88);
      opacity: 0; pointer-events: none; transition: opacity 0.4s;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    }
    .envelope-overlay.active { opacity: 1; pointer-events: auto; }
    .envelope {
      width: 200px; height: 140px; position: relative;
      transform: scale(0.5) rotate(-5deg);
      transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .envelope-overlay.active .envelope { transform: scale(1) rotate(0deg); }
    .envelope-body {
      width: 100%; height: 100%; background: linear-gradient(135deg, #ffe8f0, #ffd0e0);
      border-radius: 12px; box-shadow: 0 4px 20px rgba(232,122,173,0.3);
      position: relative; overflow: hidden;
    }
    .envelope-body::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 40%;
      background: linear-gradient(to top, rgba(248,164,200,0.15), transparent);
    }
    .envelope-seal {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      font-size: 28px; z-index: 3;
    }
    .envelope-flap {
      width: 0; height: 0; position: absolute; top: -1px; left: 0;
      border-left: 100px solid transparent; border-right: 100px solid transparent;
      border-top: 76px solid #f8a4c8;
      transform-origin: top center; transition: transform 0.5s ease; z-index: 2;
    }
    .envelope.opening .envelope-flap { transform: rotateX(180deg); }
    .letter-paper {
      position: absolute; top: 24px; left: 50%; transform: translateX(-50%);
      width: 160px; height: 90px; background: white; border-radius: 6px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08); z-index: 1;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.25s;
    }
    .envelope.opening .letter-paper { transform: translateX(-50%) translateY(-70px); }
    .letter-paper span { font-size: 22px; }
    .draw-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, var(--pink-main), var(--pink-deep));
      color: white; border: none; border-radius: 50px; padding: 16px 40px;
      font-family: inherit; font-size: 16px; font-weight: 700; cursor: pointer;
      letter-spacing: 0.08em; box-shadow: 0 4px 16px rgba(232,122,173,0.4);
      transition: all 0.25s ease; -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .draw-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(232,122,173,0.5); }
    .draw-btn:active { transform: translateY(0) scale(0.97); }
    .draw-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
    .draw-btn .icon { font-size: 20px; }
    .confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 30; }
    .confetti { position: absolute; top: -10px; animation: confettiFall linear forwards; }
    @keyframes confettiFall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    .counter { margin-top: 16px; font-size: 11px; color: var(--text-light); opacity: 0.6; }
    .footer { position: fixed; bottom: 16px; z-index: 1; font-size: 10px; color: var(--pink-main); opacity: 0.5; }
  </style>
</head>
<body>
  <div class="bg-hearts" id="bgHearts"></div>

  <div class="envelope-overlay" id="envelopeOverlay">
    <div class="envelope" id="envelope">
      <div class="letter-paper"><span>❤️</span></div>
      <div class="envelope-body"></div>
      <div class="envelope-seal">💌</div>
      <div class="envelope-flap"></div>
    </div>
  </div>

  <div class="card">
    <div class="photo-frame" id="photoFrame">
      <img id="photo" src="photo.jpg" alt=""
        onerror="this.style.display='none'; document.getElementById('photoPlaceholder').style.display='block';">
      <div id="photoPlaceholder" class="placeholder" style="display:none;">💕</div>
    </div>
    <div class="title">きょうのメッセージ</div>
    <div class="date" id="dateText"></div>
    <div class="message-area">
      <div class="teasing" id="teasing">
        <div class="teasing-text" id="teasingText">ドキドキ…</div>
        <div class="teasing-dots"><span></span><span></span><span></span></div>
      </div>
      <div class="heart-burst" id="heartBurst"></div>
      <div class="message-text message-initial" id="messageText">ボタンを押してね</div>
    </div>
    <button class="draw-btn" id="drawBtn" onclick="drawMessage()">
      <span class="icon">💌</span> ひ い て み る
    </button>
    <div class="counter" id="counter"></div>
  </div>
  <div class="footer">made with love</div>
  <div class="confetti-container" id="confetti"></div>

  <script src="messages.js"></script>
  <script>
    const teasingPhrases = [
      "ドキドキ…", "なにが出るかな…💓", "ふふ、待っててね…",
      "あなたへの気持ち…💕", "とどけ…！", "えへへ…💗",
      "きょうの気持ちは…", "そっと開くね…💌"
    ];

    const now = new Date();
    const dayNames = ['日','月','火','水','木','金','土'];
    document.getElementById('dateText').textContent =
      `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${dayNames[now.getDay()]}）`;

    const hearts = ['♡','♥','❤','💗'];
    const bgEl = document.getElementById('bgHearts');
    for (let i = 0; i < 15; i++) {
      const s = document.createElement('span');
      s.className = 'heart'; s.textContent = hearts[Math.floor(Math.random()*hearts.length)];
      s.style.left = Math.random()*100+'%'; s.style.fontSize = (12+Math.random()*20)+'px';
      s.style.animationDuration = (8+Math.random()*12)+'s'; s.style.animationDelay = Math.random()*10+'s';
      bgEl.appendChild(s);
    }

    let drawCount = 0, isAnimating = false;

    function drawMessage() {
      if (isAnimating) return;
      isAnimating = true;
      const btn = document.getElementById('drawBtn');
      const msgEl = document.getElementById('messageText');
      const teasing = document.getElementById('teasing');
      const teasingText = document.getElementById('teasingText');
      const photoFrame = document.getElementById('photoFrame');
      const envelopeOverlay = document.getElementById('envelopeOverlay');
      const envelope = document.getElementById('envelope');

      btn.disabled = true;
      msgEl.classList.remove('visible','message-initial');
      msgEl.style.opacity = '0';

      envelope.classList.remove('opening');
      envelopeOverlay.classList.add('active');
      setTimeout(() => envelope.classList.add('opening'), 800);
      setTimeout(() => {
        envelopeOverlay.classList.remove('active');
        setTimeout(() => envelope.classList.remove('opening'), 400);
      }, 1800);

      const phrase = teasingPhrases[Math.floor(Math.random()*teasingPhrases.length)];
      setTimeout(() => {
        teasingText.textContent = phrase;
        teasing.classList.add('active');
        photoFrame.classList.add('beating');
      }, 1900);

      setTimeout(() => {
        teasing.classList.remove('active');
        photoFrame.classList.remove('beating');
        setTimeout(() => {
          const idx = Math.floor(Math.random()*messages.length);
          msgEl.style.opacity = '';
          msgEl.textContent = messages[idx];
          msgEl.classList.add('visible');
          spawnHeartBurst(); spawnConfetti();
          drawCount++;
          document.getElementById('counter').textContent = `きょう ${drawCount} 回ひいたよ`;
          btn.disabled = false; isAnimating = false;
        }, 200);
      }, 3400);
    }

    function spawnHeartBurst() {
      const c = document.getElementById('heartBurst'); c.innerHTML = '';
      const emojis = ['❤️','💕','💗','💓','💖','💘','✨'];
      for (let i = 0; i < 8; i++) {
        const el = document.createElement('span');
        el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
        el.style.position = 'absolute'; el.style.fontSize = (16+Math.random()*12)+'px';
        const angle = (i/8)*Math.PI*2, dist = 60+Math.random()*40;
        const tx = Math.cos(angle)*dist, ty = Math.sin(angle)*dist;
        el.animate([
          { transform: 'translate(0,0) scale(0)', opacity: 1 },
          { transform: `translate(${tx}px,${ty}px) scale(1.2)`, opacity: 1, offset: 0.5 },
          { transform: `translate(${tx*1.3}px,${ty*1.3}px) scale(0.8)`, opacity: 0 }
        ], { duration: 800, easing: 'ease-out', fill: 'forwards' });
        c.appendChild(el);
        setTimeout(() => el.remove(), 1000);
      }
    }

    function spawnConfetti() {
      const c = document.getElementById('confetti');
      const colors = ['#f8a4c8','#ffd6e7','#ffb3d9','#ff8fbf','#ffc1e3','#ff69b4'];
      for (let i = 0; i < 30; i++) {
        const el = document.createElement('div'); el.className = 'confetti';
        el.style.left = Math.random()*100+'%';
        el.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
        const sz = 4+Math.random()*8;
        el.style.width = sz+'px'; el.style.height = sz+'px';
        el.style.borderRadius = Math.random()>0.5 ? '50%' : '2px';
        el.style.animationDuration = (1.5+Math.random()*2)+'s';
        el.style.animationDelay = Math.random()*0.5+'s';
        c.appendChild(el); setTimeout(() => el.remove(), 4000);
      }
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
<script data-goatcounter="https://npcm218.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
